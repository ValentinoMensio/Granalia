services:
  postgres:
    image: postgres:16
    container_name: granalia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: granalia
      POSTGRES_USER: granalia
      POSTGRES_PASSWORD: granalia
    ports:
      - "5432:5432"
    volumes:
      - granalia_postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer:4
    container_name: granalia-adminer
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8082:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres

volumes:
  granalia_postgres_data:
