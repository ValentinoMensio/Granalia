services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      GRANALIA_API_UPSTREAM: ${GRANALIA_API_UPSTREAM:-host.docker.internal:8000}
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../frontend/dist:/srv/granalia/frontend/dist:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
